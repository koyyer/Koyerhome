    <audio id="bg-music" autoplay loop>
        <source src="musica.mp3" type="audio/mpeg">
        Seu navegador não suporta áudio embutido.
    </audio>

    <div class="audio-controls">
        <button id="mute-btn">Desligar som</button>
    </div>

    <script>
        const audio = document.getElementById('bg-music');
        const muteBtn = document.getElementById('mute-btn');

        audio.loop = true;
        audio.muted = false;

        muteBtn.addEventListener('click', () => {
            audio.muted = !audio.muted;
            muteBtn.textContent = audio.muted ? 'Ligar som' : 'Desligar som';
        });

        // Tenta autoplay imediato
        audio.play().then(() => {
            // Tocando
        }).catch((err) => {
            console.log('Autoplay bloqueado; use o botão para ativar.', err);
        });
    </script>
